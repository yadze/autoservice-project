<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Мой профиль | Автосервис</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #f5f5f5; margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; background: white; border-radius: 16px; padding: 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { color: #c0392b; }
        .order-item { background: #f9f9f9; padding: 12px; margin-bottom: 10px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; }
        button { background: #c0392b; color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; margin-right: 10px; }
        .back-link { display: inline-block; margin-top: 20px; color: #c0392b; text-decoration: none; }
    </style>
</head>
<body>
<div class="container">
    <h1>Мой профиль</h1>
    <p><strong>Имя пользователя:</strong> <span id="profileUsername"></span></p>
    <p><strong>ID:</strong> <span id="profileUserId"></span></p>
    <p><strong>Ваш токен (access_token):</strong> <span id="accessTokenDisplay" style="word-break:break-all;"></span></p>
    <button id="refreshTokenBtn">Обновить токен</button>
    <button id="logoutBtn">Выйти</button>

    <h2>Мои заказы</h2>
    <div id="profileOrdersList"></div>

    <div class="back-link"><a href="/">← На главную</a></div>
</div>

<script>
    const API_BASE = "";
    let accessToken = localStorage.getItem("access_token");
    let refreshToken = localStorage.getItem("refresh_token");

    async function apiCall(endpoint, options = {}) {
        const headers = { "Content-Type": "application/json", ...options.headers };
        if (accessToken) headers["Authorization"] = `Bearer ${accessToken}`;
        const response = await fetch(API_BASE + endpoint, { ...options, headers });
        if (response.status === 401 && refreshToken) {
            const refreshResp = await fetch(API_BASE + "/api/refresh?refresh_token=" + refreshToken, { method: "POST" });
            if (refreshResp.ok) {
                const data = await refreshResp.json();
                accessToken = data.access_token;
                localStorage.setItem("access_token", accessToken);
                return apiCall(endpoint, options);
            } else {
                logout();
                throw new Error("Session expired");
            }
        }
        return response;
    }

    async function loadProfile() {
        if (!accessToken) {
            alert("Необходимо войти в систему");
            window.location.href = "/";
            return;
        }
        const userRes = await apiCall("/api/users/me");
        if (userRes.ok) {
            const user = await userRes.json();
            document.getElementById("profileUsername").innerText = user.username;
            document.getElementById("profileUserId").innerText = user.id;
        } else {
            alert("Не удалось загрузить профиль");
            window.location.href = "/";
            return;
        }
        const ordersRes = await apiCall("/api/orders");
        if (ordersRes.ok) {
            const data = await ordersRes.json();
            const container = document.getElementById("profileOrdersList");
            if (data.items && data.items.length) {
                container.innerHTML = data.items.map(order => `
                    <div class="order-item">
                        <span><strong>${order.service_title}</strong> - ${new Date(order.created_at).toLocaleString()}</span>
                        <button onclick="cancelOrder(${order.id})">Отменить</button>
                    </div>
                `).join('');
            } else {
                container.innerHTML = "<p>У вас пока нет заказов.</p>";
            }
        } else {
            document.getElementById("profileOrdersList").innerHTML = "<p>Ошибка загрузки заказов</p>";
        }
    }

    window.cancelOrder = async function(orderId) {
        if (!accessToken) return;
        const res = await apiCall(`/api/orders/${orderId}`, { method: "DELETE" });
        if (res.ok) {
            alert("Заказ отменён");
            loadProfile();
        } else {
            alert("Не удалось отменить");
        }
    };

    async function refreshTokenFunc() {
        if (!refreshToken) return;
        const res = await fetch(API_BASE + "/api/refresh?refresh_token=" + refreshToken, { method: "POST" });
        if (res.ok) {
            const data = await res.json();
            accessToken = data.access_token;
            localStorage.setItem("access_token", accessToken);
            document.getElementById("accessTokenDisplay").innerText = accessToken;
            alert("Токен обновлён");
        } else {
            alert("Не удалось обновить токен, войдите заново");
            logout();
        }
    }

    function logout() {
        localStorage.clear();
        window.location.href = "/";
    }

    document.getElementById("refreshTokenBtn").onclick = refreshTokenFunc;
    document.getElementById("accessTokenDisplay").innerText = accessToken;
    document.getElementById("logoutBtn").onclick = logout;

    loadProfile();
</script>
</body>
</html>
